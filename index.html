<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三杯猜球 - Shell Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --cup-primary: #e74c3c;
            --cup-secondary: #c0392b;
            --cup-highlight: #ff6b6b;
            --ball-primary: #f39c12;
            --ball-glow: #f1c40f;
            --bg-primary: #2c3e50;
            --bg-secondary: #34495e;
            --table: #8b6f47;
            --success: #2ecc71;
            --error: #e74c3c;
            --text-primary: #ecf0f1;
            --text-secondary: #95a5a6;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--table) 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        #topBar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
        }

        .stat-icon {
            font-size: 18px;
        }

        .stat-value {
            color: var(--ball-glow);
            font-size: 18px;
        }

        #streak {
            color: #ff6b6b;
        }

        /* Message Area */
        #messageArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        #message {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #message.show {
            opacity: 1;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            pointer-events: auto;
            transition: opacity 0.3s;
        }

        .screen.hidden {
            display: none;
        }

        h1 {
            color: var(--ball-glow);
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 var(--cup-primary);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, var(--cup-primary) 0%, var(--cup-secondary) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--text-secondary);
            box-shadow: none;
        }

        .btn-secondary:hover {
            border-color: var(--text-primary);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Tutorial */
        .tutorial-content {
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .tutorial-step {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .tutorial-step .icon {
            font-size: 30px;
        }

        .tutorial-step .text {
            color: var(--text-primary);
            font-size: 14px;
            text-align: left;
        }

        /* Result overlay */
        #resultOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #resultOverlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #resultText {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        #resultText.correct {
            color: var(--success);
            text-shadow: 0 0 30px var(--success);
        }

        #resultText.wrong {
            color: var(--error);
            text-shadow: 0 0 30px var(--error);
        }

        #scorePopup {
            font-size: 24px;
            color: var(--ball-glow);
            margin-bottom: 30px;
        }

        /* Floating text animation */
        .float-text {
            position: absolute;
            font-size: 24px;
            font-weight: 700;
            color: var(--ball-glow);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            #gameContainer {
                aspect-ratio: 3/4;
                border-radius: 0;
            }

            h1 {
                font-size: 28px;
            }

            .stat {
                font-size: 12px;
            }

            .stat-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui">
            <div id="topBar">
                <div class="stat">
                    <span class="stat-icon">🏆</span>
                    <span>分数</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">📊</span>
                    <span>关卡</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">🔥</span>
                    <span>连胜</span>
                    <span class="stat-value" id="streak">0</span>
                </div>
            </div>
        </div>

        <!-- Message Area -->
        <div id="messageArea">
            <div id="message"></div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="screen">
            <h1>🎲 三杯猜球</h1>
            <p class="subtitle">你能跟上球的速度吗？</p>
            <button class="btn" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="tutorialBtn">游戏说明</button>
        </div>

        <!-- Tutorial -->
        <div id="tutorial" class="screen hidden">
            <div class="tutorial-content">
                <h1>📖 游戏规则</h1>
                <div class="tutorial-step">
                    <span class="icon">👀</span>
                    <span class="text">仔细观察球放入哪个杯子</span>
                </div>
                <div class="tutorial-step">
                    <span class="icon">🌀</span>
                    <span class="text">杯子会开始交换，速度越来越快</span>
                </div>
                <div class="tutorial-step">
                    <span class="icon">👆</span>
                    <span class="text">点击你认为有球的杯子</span>
                </div>
                <div class="tutorial-step">
                    <span class="icon">🏆</span>
                    <span class="text">连胜可以升级，速度会越来越快！</span>
                </div>
                <button class="btn" id="startFromTutorial">开始挑战</button>
            </div>
        </div>

        <!-- Result Overlay -->
        <div id="resultOverlay">
            <div id="resultText"></div>
            <div id="scorePopup"></div>
            <button class="btn" id="continueBtn">继续</button>
        </div>
    </div>

    <script>
        // ==========================================
        // Configuration
        // ==========================================
        const CONFIG = {
            CUP: {
                COUNT: 3,
                WIDTH: 100,
                HEIGHT: 120,
                SPACING: 150,
                COLOR: '#e74c3c',
                RIM_COLOR: '#c0392b',
                HIGHLIGHT_COLOR: '#ff6b6b'
            },
            BALL: {
                RADIUS: 18,
                COLOR: '#f39c12',
                GLOW_COLOR: '#f1c40f'
            },
            ANIMATION: {
                LIFT_HEIGHT: 80,
                LIFT_DURATION: 400,
                REVEAL_DURATION: 1500,
                SHUFFLE_BASE_SPEED: 700,
                SHUFFLE_MIN_SPEED: 250,
                SPEED_DECREMENT: 40
            },
            DIFFICULTY: {
                LEVELS: [
                    { swaps: 3, speed: 700 },
                    { swaps: 5, speed: 600 },
                    { swaps: 7, speed: 500 },
                    { swaps: 10, speed: 450 },
                    { swaps: 12, speed: 400 },
                    { swaps: 15, speed: 350 },
                    { swaps: 18, speed: 300 },
                    { swaps: 20, speed: 250 }
                ]
            }
        };

        // ==========================================
        // Game States
        // ==========================================
        const GameState = {
            IDLE: 'idle',
            REVEAL: 'reveal',
            COVER: 'cover',
            SHUFFLE: 'shuffle',
            GUESS: 'guess',
            RESULT: 'result'
        };

        // ==========================================
        // Easing Functions
        // ==========================================
        const Easing = {
            easeOutQuad: t => t * (2 - t),
            easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
            easeOutBounce: t => {
                if (t < 1/2.75) return 7.5625 * t * t;
                if (t < 2/2.75) return 7.5625 * (t -= 1.5/2.75) * t + 0.75;
                if (t < 2.5/2.75) return 7.5625 * (t -= 2.25/2.75) * t + 0.9375;
                return 7.5625 * (t -= 2.625/2.75) * t + 0.984375;
            },
            easeOutElastic: t => {
                const c4 = (2 * Math.PI) / 3;
                return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
            }
        };

        // ==========================================
        // Utility Functions
        // ==========================================
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function lighten(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // ==========================================
        // Cup Class
        // ==========================================
        class Cup {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.baseY = y;
                this.liftOffset = 0;
                this.targetX = x;
                this.isAnimating = false;
                this.hoverScale = 1;
                this.isHovered = false;
            }

            lift(duration = CONFIG.ANIMATION.LIFT_DURATION) {
                return this.animate('liftOffset', -CONFIG.ANIMATION.LIFT_HEIGHT, duration, Easing.easeOutQuad);
            }

            drop(duration = CONFIG.ANIMATION.LIFT_DURATION) {
                return this.animate('liftOffset', 0, duration, Easing.easeOutBounce);
            }

            animate(property, target, duration, easing) {
                return new Promise(resolve => {
                    this.isAnimating = true;
                    const start = this[property];
                    const startTime = performance.now();

                    const step = (now) => {
                        const elapsed = now - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = easing(progress);

                        this[property] = start + (target - start) * eased;

                        if (progress < 1) {
                            requestAnimationFrame(step);
                        } else {
                            this.isAnimating = false;
                            resolve();
                        }
                    };

                    requestAnimationFrame(step);
                });
            }

            update() {
                // Smooth hover effect
                const targetScale = this.isHovered ? 1.05 : 1;
                this.hoverScale += (targetScale - this.hoverScale) * 0.1;
            }

            draw(ctx) {
                const x = this.x;
                const y = this.y + this.liftOffset;
                const w = CONFIG.CUP.WIDTH * this.hoverScale;
                const h = CONFIG.CUP.HEIGHT * this.hoverScale;
                const offsetX = (CONFIG.CUP.WIDTH - w) / 2;

                ctx.save();

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(x + CONFIG.CUP.WIDTH/2, this.baseY + CONFIG.CUP.HEIGHT - 5, w/2, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Cup body gradient
                const gradient = ctx.createLinearGradient(x + offsetX, y, x + offsetX + w, y);
                gradient.addColorStop(0, CONFIG.CUP.COLOR);
                gradient.addColorStop(0.5, lighten(CONFIG.CUP.COLOR, 20));
                gradient.addColorStop(1, CONFIG.CUP.COLOR);

                // Cup body (trapezoid shape)
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(x + offsetX + 10, y);
                ctx.lineTo(x + offsetX + w - 10, y);
                ctx.lineTo(x + offsetX + w, y + h);
                ctx.lineTo(x + offsetX, y + h);
                ctx.closePath();
                ctx.fill();

                // Cup rim
                ctx.fillStyle = CONFIG.CUP.RIM_COLOR;
                ctx.beginPath();
                ctx.ellipse(x + CONFIG.CUP.WIDTH/2, y, w/2 - 5, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Inner rim (darker)
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(x + CONFIG.CUP.WIDTH/2, y, w/2 - 15, 6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.ellipse(x + offsetX + w/3, y + h/3, 6, 15, 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            contains(mx, my) {
                const x = this.x;
                const y = this.y + this.liftOffset;
                const w = CONFIG.CUP.WIDTH;
                const h = CONFIG.CUP.HEIGHT;
                return mx >= x && mx <= x + w && my >= y && my <= y + h;
            }
        }

        // ==========================================
        // Ball Class
        // ==========================================
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = CONFIG.BALL.RADIUS;
                this.glowPhase = 0;
            }

            update(deltaTime) {
                this.glowPhase += deltaTime * 0.005;
            }

            draw(ctx) {
                const glowIntensity = 0.5 + Math.sin(this.glowPhase) * 0.3;

                ctx.save();

                // Outer glow
                ctx.shadowBlur = 20 + glowIntensity * 10;
                ctx.shadowColor = CONFIG.BALL.GLOW_COLOR;

                // Ball gradient
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius/3, this.y - this.radius/3, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, CONFIG.BALL.GLOW_COLOR);
                gradient.addColorStop(0.5, CONFIG.BALL.COLOR);
                gradient.addColorStop(1, '#d68910');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255,255,255,${0.6 + glowIntensity * 0.2})`;
                ctx.beginPath();
                ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // ==========================================
        // Particle System
        // ==========================================
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10 - 5;
                this.color = color;
                this.life = 1;
                this.size = Math.random() * 6 + 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= 0.02;
                this.size *= 0.98;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ==========================================
        // Main Game Class
        // ==========================================
        class ShellGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = GameState.IDLE;
                this.cups = [];
                this.ball = null;
                this.ballPosition = 0;
                this.level = 1;
                this.score = 0;
                this.streak = 0;
                this.particles = [];
                this.canGuess = false;
                this.playerGuess = -1;

                this.resize();
                window.addEventListener('resize', () => this.resize());

                this.init();
            }

            resize() {
                const container = document.getElementById('gameContainer');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
                this.initCups();
            }

            init() {
                this.initCups();
                this.ball = new Ball(0, 0);
                this.bindEvents();
                this.loop();
            }

            initCups() {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2 + 30;
                const spacing = Math.min(CONFIG.CUP.SPACING, this.canvas.width / 4);

                this.cups = [];
                for (let i = 0; i < CONFIG.CUP.COUNT; i++) {
                    const x = centerX + (i - 1) * spacing - CONFIG.CUP.WIDTH / 2;
                    this.cups.push(new Cup(i, x, centerY));
                }

                // Update ball position if cups moved
                if (this.ball) {
                    this.updateBallPosition();
                }
            }

            updateBallPosition() {
                const cup = this.cups[this.ballPosition];
                if (cup) {
                    this.ball.x = cup.x + CONFIG.CUP.WIDTH / 2;
                    this.ball.y = cup.y + CONFIG.CUP.HEIGHT - 30;
                }
            }

            bindEvents() {
                // Mouse events
                this.canvas.addEventListener('mousemove', e => this.handleMouseMove(e));
                this.canvas.addEventListener('mousedown', e => this.handleClick(e));

                // Touch events - use pointer events for better compatibility
                this.canvas.addEventListener('touchstart', e => {
                    e.preventDefault();
                    this.handleTouch(e);
                }, { passive: false });

                // Also handle touchend as a fallback
                this.canvas.addEventListener('touchend', e => {
                    e.preventDefault();
                    this.handleTouch(e);
                }, { passive: false });

                // UI buttons
                document.getElementById('startBtn').addEventListener('click', () => {
                    document.getElementById('mainMenu').classList.add('hidden');
                    this.startGame();
                });

                document.getElementById('tutorialBtn').addEventListener('click', () => {
                    document.getElementById('mainMenu').classList.add('hidden');
                    document.getElementById('tutorial').classList.remove('hidden');
                });

                document.getElementById('startFromTutorial').addEventListener('click', () => {
                    document.getElementById('tutorial').classList.add('hidden');
                    this.startGame();
                });

                document.getElementById('continueBtn').addEventListener('click', async () => {
                    document.getElementById('resultOverlay').classList.remove('show');
                    // Drop all cups before next round
                    await Promise.all(this.cups.map(cup => cup.drop()));
                    await delay(300);
                    if (this.streak > 0) {
                        this.nextRound();
                    } else {
                        this.resetGame();
                    }
                });
            }

            getMousePos(e) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }

            handleMouseMove(e) {
                if (this.state !== GameState.GUESS) return;

                const pos = this.getMousePos(e);
                this.cups.forEach(cup => {
                    cup.isHovered = cup.contains(pos.x, pos.y);
                });
            }

            handleClick(e) {
                if (this.state !== GameState.GUESS || !this.canGuess) return;

                const pos = this.getMousePos(e);
                this.cups.forEach((cup, index) => {
                    if (cup.contains(pos.x, pos.y)) {
                        this.makeGuess(index);
                    }
                });
            }

            handleTouch(e) {
                if (this.state !== GameState.GUESS || !this.canGuess) return;
                e.preventDefault();

                // 使用 changedTouches 确保获取到触摸点
                const touch = e.changedTouches[0] || e.touches[0];
                if (!touch) return;

                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;

                const pos = {
                    x: (touch.clientX - rect.left) * scaleX,
                    y: (touch.clientY - rect.top) * scaleY
                };

                // 检查每个杯子，找到被点击的
                for (let i = 0; i < this.cups.length; i++) {
                    if (this.cups[i].contains(pos.x, pos.y)) {
                        this.makeGuess(i);
                        break;
                    }
                }
            }

            async startGame() {
                this.score = 0;
                this.level = 1;
                this.streak = 0;
                this.updateUI();
                await this.nextRound();
            }

            async nextRound() {
                this.state = GameState.REVEAL;
                this.showMessage('');
                await this.revealPhase();
            }

            resetGame() {
                this.state = GameState.IDLE;
                document.getElementById('mainMenu').classList.remove('hidden');
            }

            async revealPhase() {
                // Randomly choose ball position
                this.ballPosition = Math.floor(Math.random() * CONFIG.CUP.COUNT);
                this.updateBallPosition();

                const cup = this.cups[this.ballPosition];

                // Lift cup to reveal ball
                await cup.lift();
                await delay(CONFIG.ANIMATION.REVEAL_DURATION);

                // Cover ball
                this.state = GameState.COVER;
                await cup.drop();
                await delay(300);

                // Start shuffling
                this.state = GameState.SHUFFLE;
                await this.shufflePhase();
            }

            async shufflePhase() {
                const difficulty = CONFIG.DIFFICULTY.LEVELS[Math.min(this.level - 1, CONFIG.DIFFICULTY.LEVELS.length - 1)];
                const swaps = this.generateSwapSequence(difficulty.swaps);

                // Track ball position through swaps
                this.ballPosition = this.trackBallPosition(this.ballPosition, swaps);

                // Execute swaps with increasing speed
                let currentSpeed = difficulty.speed;

                for (const [cupA, cupB] of swaps) {
                    currentSpeed = Math.max(
                        currentSpeed - CONFIG.ANIMATION.SPEED_DECREMENT,
                        CONFIG.ANIMATION.SHUFFLE_MIN_SPEED
                    );

                    await this.swapCups(cupA, cupB, currentSpeed);
                }

                // Update ball's actual position
                this.updateBallPosition();

                // Enter guess phase
                this.state = GameState.GUESS;
                this.canGuess = true;
                this.showMessage('点击选择杯子！');
            }

            generateSwapSequence(swapCount) {
                const swaps = [];
                let lastSwap = null;

                for (let i = 0; i < swapCount; i++) {
                    let cupA, cupB;

                    do {
                        cupA = Math.floor(Math.random() * CONFIG.CUP.COUNT);
                        cupB = Math.floor(Math.random() * CONFIG.CUP.COUNT);
                    } while (
                        cupA === cupB ||
                        (lastSwap && lastSwap[0] === cupB && lastSwap[1] === cupA)
                    );

                    swaps.push([cupA, cupB]);
                    lastSwap = [cupA, cupB];
                }

                return swaps;
            }

            trackBallPosition(initialPos, swaps) {
                let pos = initialPos;
                for (const [cupA, cupB] of swaps) {
                    if (pos === cupA) pos = cupB;
                    else if (pos === cupB) pos = cupA;
                }
                return pos;
            }

            async swapCups(indexA, indexB, duration) {
                const cupA = this.cups[indexA];
                const cupB = this.cups[indexB];

                const arcHeight = 40;
                const startXA = cupA.x;
                const startXB = cupB.x;
                const startTime = performance.now();

                await new Promise(resolve => {
                    const animate = (now) => {
                        const elapsed = now - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = Easing.easeInOutQuad(progress);

                        // Horizontal movement
                        cupA.x = startXA + (startXB - startXA) * eased;
                        cupB.x = startXB + (startXA - startXB) * eased;

                        // Arc height
                        const arcProgress = 1 - Math.abs(progress - 0.5) * 2;
                        cupA.liftOffset = -arcHeight * arcProgress;
                        cupB.liftOffset = -arcHeight * arcProgress;

                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            cupA.liftOffset = 0;
                            cupB.liftOffset = 0;
                            resolve();
                        }
                    };

                    requestAnimationFrame(animate);
                });

                // Swap in array
                [this.cups[indexA], this.cups[indexB]] = [this.cups[indexB], this.cups[indexA]];
            }

            async makeGuess(index) {
                if (!this.canGuess) return;
                this.canGuess = false;
                this.playerGuess = index;

                this.cups.forEach(cup => cup.isHovered = false);
                this.showMessage('');

                await this.showResult();
            }

            async showResult() {
                const correct = this.playerGuess === this.ballPosition;

                // Lift selected cup first
                await this.cups[this.playerGuess].lift();
                await delay(200);

                // If wrong, also lift the correct cup
                if (!correct && this.playerGuess !== this.ballPosition) {
                    await this.cups[this.ballPosition].lift();
                }

                // Wait 1 second to let player see the result
                this.state = GameState.RESULT;
                await delay(1000);

                // Update score and streak
                if (correct) {
                    this.streak++;
                    const points = 100 * this.level;
                    this.score += points;

                    if (this.streak % 3 === 0) {
                        this.level++;
                    }

                    this.createParticles(this.cups[this.playerGuess].x + CONFIG.CUP.WIDTH/2,
                                        this.cups[this.playerGuess].y + CONFIG.CUP.HEIGHT/2,
                                        CONFIG.BALL.GLOW_COLOR);
                    this.showResultOverlay(true, `+${points}`);
                } else {
                    this.streak = 0;
                    this.showResultOverlay(false, '游戏结束');
                }

                this.updateUI();
            }

            showResultOverlay(correct, text) {
                const overlay = document.getElementById('resultOverlay');
                const resultText = document.getElementById('resultText');
                const scorePopup = document.getElementById('scorePopup');

                resultText.textContent = correct ? '🎉 猜对了！' : '😢 猜错了';
                resultText.className = correct ? 'correct' : 'wrong';
                scorePopup.textContent = text;

                overlay.classList.add('show');
            }

            showLevelUp() {
                this.showMessage(`🎊 升级到关卡 ${this.level}！`);
                this.createParticles(this.canvas.width/2, this.canvas.height/2, '#ff6b6b', 30);
            }

            showMessage(text) {
                const msg = document.getElementById('message');
                msg.textContent = text;
                msg.classList.toggle('show', text !== '');
            }

            createParticles(x, y, color, count = 20) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('streak').textContent = this.streak;
            }

            update() {
                // Update cups
                this.cups.forEach(cup => cup.update());

                // Update ball
                if (this.ball) {
                    this.ball.update(16);
                }

                // Update particles
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.life > 0;
                });
            }

            draw() {
                const ctx = this.ctx;

                // Clear canvas
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw table surface
                const gradient = ctx.createLinearGradient(0, this.canvas.height/2, 0, this.canvas.height);
                gradient.addColorStop(0, 'rgba(139, 111, 71, 0.3)');
                gradient.addColorStop(1, 'rgba(139, 111, 71, 0.6)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, this.canvas.height/2, this.canvas.width, this.canvas.height/2);

                // Determine if ball should be visible
                const shouldShowBall = this.state === GameState.REVEAL ||
                                       this.state === GameState.RESULT ||
                                       (this.state === GameState.GUESS && false); // Never show during guess

                // Draw ball (under cups)
                if (shouldShowBall && this.ball) {
                    this.ball.draw(ctx);
                }

                // Draw cups
                this.cups.forEach(cup => cup.draw(ctx));

                // Draw particles
                this.particles.forEach(p => p.draw(ctx));
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        // Start game when page loads
        window.addEventListener('load', () => {
            new ShellGame();
        });
    </script>
</body>
</html>
